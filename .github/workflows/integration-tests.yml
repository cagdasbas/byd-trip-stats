name: Integration Tests

on:
  push:
    tags:
      - 'v*'           # triggers on v1.2.0, v1.3.0, etc.
  workflow_dispatch:   # allow manual trigger for debugging

jobs:
  integration-tests:
    name: Run Integration Tests (API 29)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore

      # Enable KVM for hardware acceleration — dramatically speeds up the emulator
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run integration tests on emulator (API 29)
        uses: reactivecircus/android-emulator-runner@v2
        env:
          KEYSTORE_PATH: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        with:
          api-level: 29
          arch: x86_64
          profile: pixel_3a
          target: default
          # Exclude @LargeTest — those manipulate singletons and should only
          # run in a fully isolated environment (the emulator here is fine,
          # but we keep the annotation consistent with local usage on the car)
          # Flavors renamed connectedDebugAndroidTest → connected<Flavor>DebugAndroidTest.
          # dilink3 is the emulator-testable path (dilink5's OEM SDK binding only exists on a real car).
          script: ./gradlew connectedDilink3DebugAndroidTest -Pandroid.testInstrumentationRunnerArguments.notAnnotation=androidx.test.filters.LargeTest

      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: app/build/reports/androidTests/connected/
          retention-days: 14