<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>BYD Trip Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg: #0f1115;
    --panel: #181b22;
    --panel-2: #20242d;
    --text: #e6e8ec;
    --muted: #9aa3b2;
    --accent: #4cc9f0;
    --accent-2: #f72585;
    --border: #262b36;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    padding: 20px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }
  header h1 {
    margin: 0;
    font-size: 20px;
    font-weight: 600;
  }
  header .actions {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  button, label.file-btn {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s;
  }
  button:hover, label.file-btn:hover { background: #2a2f3b; }
  input[type=file] { display: none; }

  main { padding: 24px 28px; max-width: 1400px; margin: 0 auto; }

  #dropzone {
    border: 2px dashed var(--border);
    border-radius: 14px;
    padding: 60px 20px;
    text-align: center;
    color: var(--muted);
    transition: border-color 0.15s, background 0.15s;
    background: var(--panel);
  }
  #dropzone.drag {
    border-color: var(--accent);
    background: rgba(76, 201, 240, 0.06);
    color: var(--text);
  }
  #dropzone .icon { font-size: 38px; margin-bottom: 8px; }
  #dropzone .hint { font-size: 13px; margin-top: 6px; }
  #dropzone strong { color: var(--text); }

  .summary {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }
  .stat {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
  }
  .stat .label {
    font-size: 11px;
    text-transform: uppercase;
    color: var(--muted);
    letter-spacing: 0.5px;
  }
  .stat .value {
    font-size: 20px;
    font-weight: 600;
    margin-top: 6px;
  }
  .stat .unit { font-size: 12px; color: var(--muted); margin-left: 3px; }

  .charts {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(480px, 1fr));
    gap: 16px;
  }
  .chart-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }
  .chart-card h3 {
    margin: 0 0 12px;
    font-size: 14px;
    font-weight: 600;
    color: var(--muted);
  }
  .chart-wrap { position: relative; height: 260px; }
  .chart-wrap.map { height: 420px; border-radius: 6px; overflow: hidden; background: #20242d; }
  .full-wide { grid-column: 1 / -1; }

  .hidden { display: none !important; }
  .error {
    background: rgba(247, 37, 133, 0.1);
    border: 1px solid var(--accent-2);
    color: #ffb3cf;
    padding: 12px 16px;
    border-radius: 10px;
    margin-bottom: 16px;
    font-size: 13px;
  }
  footer {
    text-align: center;
    padding: 20px;
    color: var(--muted);
    font-size: 12px;
  }
</style>
</head>
<body>

<header>
  <h1>BYD Trip Viewer</h1>
  <div class="actions">
    <label class="file-btn" for="fileInput">Open file…</label>
    <input id="fileInput" type="file" accept=".json,application/json" />
    <button id="resetBtn" class="hidden">Load another</button>
  </div>
</header>

<main>
  <div id="error" class="error hidden"></div>

  <div id="dropzone">
    <div class="icon">📂</div>
    <div><strong>Drop a trip JSON file here</strong></div>
    <div class="hint">or click "Open file…" above</div>
  </div>

  <div id="content" class="hidden">
    <div class="summary" id="summary"></div>
    <div class="charts" id="charts"></div>
  </div>
</main>

<footer>Visualize your recorded BYD trip data — all processing happens locally in your browser.</footer>

<script>
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const resetBtn = document.getElementById('resetBtn');
const content = document.getElementById('content');
const summaryEl = document.getElementById('summary');
const chartsEl = document.getElementById('charts');
const errorEl = document.getElementById('error');

let charts = [];

function showError(msg) {
  errorEl.textContent = msg;
  errorEl.classList.remove('hidden');
}
function clearError() {
  errorEl.textContent = '';
  errorEl.classList.add('hidden');
}

['dragenter', 'dragover'].forEach(ev => {
  dropzone.addEventListener(ev, e => {
    e.preventDefault();
    e.stopPropagation();
    dropzone.classList.add('drag');
  });
});
['dragleave', 'drop'].forEach(ev => {
  dropzone.addEventListener(ev, e => {
    e.preventDefault();
    e.stopPropagation();
    dropzone.classList.remove('drag');
  });
});
dropzone.addEventListener('drop', e => {
  const file = e.dataTransfer.files?.[0];
  if (file) loadFile(file);
});
dropzone.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', e => {
  const file = e.target.files?.[0];
  if (file) loadFile(file);
});

resetBtn.addEventListener('click', () => {
  fileInput.value = '';
  content.classList.add('hidden');
  dropzone.classList.remove('hidden');
  resetBtn.classList.add('hidden');
  clearError();
  destroyCharts();
});

function loadFile(file) {
  clearError();
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      renderTrip(data);
    } catch (err) {
      showError('Failed to parse JSON: ' + err.message);
    }
  };
  reader.onerror = () => showError('Failed to read file.');
  reader.readAsText(file);
}

function fmtDuration(ms) {
  const s = Math.floor(ms / 1000);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  if (h > 0) return `${h}h ${m}m ${sec}s`;
  if (m > 0) return `${m}m ${sec}s`;
  return `${sec}s`;
}

function fmtDate(ts) {
  return new Date(ts).toLocaleString();
}

function stat(label, value, unit = '') {
  const div = document.createElement('div');
  div.className = 'stat';
  div.innerHTML = `<div class="label">${label}</div>
    <div class="value">${value}${unit ? `<span class="unit">${unit}</span>` : ''}</div>`;
  return div;
}

function destroyCharts() {
  charts.forEach(c => { try { c.destroy && c.destroy(); } catch (e) {} });
  charts = [];
  chartsEl.innerHTML = '';
}

function makeChartCard(title, fullWide = false, wrapClass = '') {
  const card = document.createElement('div');
  card.className = 'chart-card' + (fullWide ? ' full-wide' : '');
  card.innerHTML = `<h3>${title}</h3><div class="chart-wrap ${wrapClass}"></div>`;
  chartsEl.appendChild(card);
  return card.querySelector('.chart-wrap');
}

function appendCanvas(wrap) {
  const c = document.createElement('canvas');
  wrap.appendChild(c);
  return c;
}

function createLineChart(canvas, datasets, yLabel) {
  return new Chart(canvas, {
    type: 'line',
    data: { datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'nearest', intersect: false },
      plugins: {
        legend: {
          display: datasets.length > 1,
          labels: { color: '#9aa3b2', boxWidth: 12, font: { size: 11 } }
        },
        tooltip: {
          backgroundColor: '#181b22',
          borderColor: '#262b36',
          borderWidth: 1
        }
      },
      scales: {
        x: {
          type: 'time',
          time: { tooltipFormat: 'HH:mm:ss', displayFormats: { second: 'HH:mm:ss', minute: 'HH:mm' } },
          ticks: { color: '#9aa3b2', maxTicksLimit: 8 },
          grid: { color: 'rgba(255,255,255,0.04)' }
        },
        y: {
          title: { display: !!yLabel, text: yLabel, color: '#9aa3b2' },
          ticks: { color: '#9aa3b2' },
          grid: { color: 'rgba(255,255,255,0.04)' }
        }
      },
      elements: {
        point: { radius: 0, hoverRadius: 4 },
        line: { tension: 0.2, borderWidth: 2 }
      }
    }
  });
}

function renderTrip(trip) {
  destroyCharts();
  summaryEl.innerHTML = '';

  const points = Array.isArray(trip.dataPoints) ? trip.dataPoints : [];
  if (points.length === 0) {
    showError('No data points found in this trip file.');
    return;
  }

  dropzone.classList.add('hidden');
  resetBtn.classList.remove('hidden');
  content.classList.remove('hidden');

  // Summary
  if (trip.tripId != null) summaryEl.appendChild(stat('Trip ID', `#${trip.tripId}`));
  if (trip.distance != null) summaryEl.appendChild(stat('Distance', trip.distance.toFixed(2), 'km'));
  if (trip.duration != null) summaryEl.appendChild(stat('Duration', fmtDuration(trip.duration)));
  if (trip.energyConsumed != null) summaryEl.appendChild(stat('Energy', trip.energyConsumed.toFixed(2), 'kWh'));
  if (trip.consumption != null) summaryEl.appendChild(stat('Consumption', trip.consumption.toFixed(1), 'kWh/100km'));
  if (trip.maxSpeed != null) summaryEl.appendChild(stat('Max speed', trip.maxSpeed.toFixed(0), 'km/h'));
  if (trip.maxPower != null) summaryEl.appendChild(stat('Max power', trip.maxPower.toFixed(0), 'kW'));
  if (trip.startTime) summaryEl.appendChild(stat('Start', fmtDate(trip.startTime)));

  // Build only the series referenced by CHART_SPECS — single pass over points.
  const wantedFields = new Set();
  for (const spec of CHART_SPECS) {
    if (!spec.series) continue;
    for (const s of spec.series) wantedFields.add(s.field);
  }

  const series = {};
  const nonZero = {};
  for (const f of wantedFields) { series[f] = []; nonZero[f] = false; }

  for (const p of points) {
    const t = p.timestamp;
    for (const f of wantedFields) {
      const v = p[f];
      if (v == null) continue;
      series[f].push({ x: t, y: v });
      if (v !== 0) nonZero[f] = true;
    }
  }

  for (const spec of CHART_SPECS) renderSpec(spec, series, nonZero, points);
}

function renderSpec(spec, series, nonZero, points) {
  // Custom builder — spec controls its own card contents.
  if (typeof spec.build === 'function') {
    const wrap = makeChartCard(spec.title, !!spec.fullWidth, spec.wrapClass || '');
    const result = spec.build(wrap, points);
    if (result == null) {
      wrap.closest('.chart-card').remove();
      return;
    }
    charts.push(result);
    return;
  }

  // Series-based default — line chart from raw fields.
  const datasets = spec.series
    .filter(s => series[s.field].length > 0)
    .filter(s => !s.requireNonZero || nonZero[s.field])
    .map(s => ({
      label: s.label,
      data: series[s.field],
      borderColor: s.color,
      backgroundColor: s.fill ? hexToRgba(s.color, 0.1) : 'transparent',
      fill: !!s.fill
    }));

  if (datasets.length === 0) return;

  // Whole-chart skip: if the spec is gated and nothing in it has a non-zero value.
  if (spec.requireNonZero && !spec.series.some(s => nonZero[s.field])) return;

  const wrap = makeChartCard(spec.title, !!spec.fullWidth);
  const canvas = appendCanvas(wrap);
  charts.push(createLineChart(canvas, datasets, spec.yLabel));
}

function hexToRgba(hex, alpha) {
  const m = /^#([0-9a-f]{6})$/i.exec(hex);
  if (!m) return hex;
  const n = parseInt(m[1], 16);
  return `rgba(${(n >> 16) & 0xff}, ${(n >> 8) & 0xff}, ${n & 0xff}, ${alpha})`;
}

// ── Custom builders ─────────────────────────────────────────────────────────
// Each builder receives the chart-card wrap element and the points array,
// returns a Chart.js instance (or any object with a `.destroy()` method),
// or `null` to drop the card.

function buildRouteMap(wrap, points) {
  const coords = points
    .filter(p => (p.latitude || p.longitude) && (p.latitude !== 0 || p.longitude !== 0))
    .map(p => [p.latitude, p.longitude]);
  if (coords.length < 2) return null;

  const map = L.map(wrap, { zoomControl: true, attributionControl: true });
  // CARTO dark-matter tiles — free, no API key, and (unlike osm.org tiles)
  // don't require a Referer header, so they work from file:// pages too.
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    subdomains: 'abcd',
    maxZoom: 19,
    attribution: '© OpenStreetMap contributors © CARTO'
  }).addTo(map);
  const line = L.polyline(coords, { color: '#4cc9f0', weight: 4, opacity: 0.9 }).addTo(map);
  L.circleMarker(coords[0], {
    radius: 6, color: '#90e0a0', fillColor: '#90e0a0', fillOpacity: 1
  }).bindTooltip('Start').addTo(map);
  L.circleMarker(coords[coords.length - 1], {
    radius: 6, color: '#f72585', fillColor: '#f72585', fillOpacity: 1
  }).bindTooltip('End').addTo(map);
  map.fitBounds(line.getBounds(), { padding: [20, 20] });
  // Leaflet needs a size-invalidation after the card animates into the grid.
  setTimeout(() => map.invalidateSize(), 50);
  return { destroy: () => map.remove() };
}

function buildCumulativeDistance(wrap, points) {
  if (points.length < 2) return null;
  const data = [];
  let dist = 0;
  for (let i = 1; i < points.length; i++) {
    const dt = (points[i].timestamp - points[i - 1].timestamp) / 1000;
    const v  = ((points[i].speed ?? 0) + (points[i - 1].speed ?? 0)) / 2;
    dist += v * dt / 3600;
    data.push({ x: points[i].timestamp, y: dist });
  }
  return createLineChart(appendCanvas(wrap), [{
    label: 'Distance', data,
    borderColor: '#90e0a0', backgroundColor: hexToRgba('#90e0a0', 0.1), fill: true
  }], 'km');
}

function buildCumulativeEnergy(wrap, points) {
  if (points.length < 2) return null;
  const used = [], regen = [];
  let eU = 0, eR = 0;
  for (let i = 1; i < points.length; i++) {
    const dtH = (points[i].timestamp - points[i - 1].timestamp) / 1000 / 3600;
    const avg = ((points[i].power ?? 0) + (points[i - 1].power ?? 0)) / 2;
    if (avg > 0)      eU += avg * dtH;
    else if (avg < 0) eR += -avg * dtH;
    used.push({  x: points[i].timestamp, y: eU });
    regen.push({ x: points[i].timestamp, y: eR });
  }
  return createLineChart(appendCanvas(wrap), [
    { label: 'Consumed',    data: used,
      borderColor: '#f72585', backgroundColor: hexToRgba('#f72585', 0.1), fill: true },
    { label: 'Regenerated', data: regen,
      borderColor: '#90e0a0', backgroundColor: hexToRgba('#90e0a0', 0.1), fill: true }
  ], 'kWh');
}

function buildSpeedPowerScatter(wrap, points) {
  const data = points
    .filter(p => p.speed != null && p.power != null && !(p.speed === 0 && p.power === 0))
    .map(p => ({ x: p.speed, y: p.power }));
  if (data.length < 5) return null;
  return new Chart(appendCanvas(wrap), {
    type: 'scatter',
    data: { datasets: [{
      label: 'Samples', data,
      backgroundColor: 'rgba(76,201,240,0.45)',
      pointRadius: 2.5, pointHoverRadius: 5
    }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { title: { display: true, text: 'Speed (km/h)', color: '#9aa3b2' },
             ticks: { color: '#9aa3b2' }, grid: { color: 'rgba(255,255,255,0.04)' } },
        y: { title: { display: true, text: 'Power (kW)',   color: '#9aa3b2' },
             ticks: { color: '#9aa3b2' }, grid: { color: 'rgba(255,255,255,0.04)' } }
      }
    }
  });
}

function buildPowerHistogram(wrap, points) {
  const vals = points.map(p => p.power).filter(v => v != null);
  if (vals.length === 0) return null;
  const binSize = 10;
  const lo = Math.floor(Math.min(...vals) / binSize) * binSize;
  const hi = Math.ceil(Math.max(...vals) / binSize) * binSize;
  const labels = [];
  const counts = [];
  for (let b = lo; b < hi; b += binSize) {
    labels.push(`${b}…${b + binSize}`);
    counts.push(0);
  }
  if (counts.length === 0) return null;
  for (const v of vals) {
    const idx = Math.min(counts.length - 1, Math.max(0, Math.floor((v - lo) / binSize)));
    counts[idx]++;
  }
  return new Chart(appendCanvas(wrap), {
    type: 'bar',
    data: { labels, datasets: [{
      label: 'Samples', data: counts,
      backgroundColor: labels.map((_, i) =>
        (lo + i * binSize) < 0 ? 'rgba(144,224,160,0.7)' : 'rgba(247,37,133,0.7)')
    }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false },
        tooltip: { callbacks: { title: items => `${items[0].label} kW` } } },
      scales: {
        x: { ticks: { color: '#9aa3b2', maxTicksLimit: 14 },
             grid: { color: 'rgba(255,255,255,0.04)' } },
        y: { title: { display: true, text: 'Samples', color: '#9aa3b2' },
             ticks: { color: '#9aa3b2' }, grid: { color: 'rgba(255,255,255,0.04)' },
             beginAtZero: true }
      }
    }
  });
}

// ── Chart specs ─────────────────────────────────────────────────────────────
// Add a new chart by adding a single entry below. Each series references a
// field on a data point and a color. Set `requireNonZero` on a chart to skip
// it entirely if every series is empty/zero (useful for telemetry the car
// doesn't expose). Set `requireNonZero` on a single series to drop just that
// line when it has no signal. `fullWidth` makes the card span both columns.
// For derived analytics, set `build: fn(wrap, points)` instead of `series`.
const CHART_SPECS = [
  { title: 'Route', fullWidth: true, wrapClass: 'map', build: buildRouteMap },

  { title: 'Speed (km/h)', yLabel: 'km/h',
    series: [{ field: 'speed', label: 'Speed', color: '#4cc9f0', fill: true }] },

  { title: 'Power (kW)', yLabel: 'kW',
    series: [{ field: 'power', label: 'Power', color: '#f72585', fill: true }] },

  { title: 'State of Charge (%)', yLabel: '%',
    series: [
      { field: 'soc',      label: 'BMS SOC',   color: '#90e0a0', fill: true },
      { field: 'socPanel', label: 'Panel SOC', color: '#4cc9f0', requireNonZero: true }
    ] },

  { title: 'Altitude (m)', yLabel: 'm', requireNonZero: true,
    series: [{ field: 'altitude', label: 'Altitude', color: '#ffb84d', fill: true }] },

  { title: 'Battery temperature (°C)', yLabel: '°C', requireNonZero: true,
    series: [{ field: 'batteryTemp', label: 'Battery temp', color: '#ff7f50', fill: true }] },

  { title: 'Estimated range (km)', yLabel: 'km', requireNonZero: true,
    series: [{ field: 'electricDrivingRangeKm', label: 'Range estimate', color: '#b388ff', fill: true }] },

  { title: 'State of Health (%)', yLabel: '%', requireNonZero: true,
    series: [{ field: 'soh', label: 'SOH', color: '#90e0a0' }] },

  { title: 'Battery pack voltage (V)', yLabel: 'V', requireNonZero: true,
    series: [{ field: 'batteryTotalVoltage', label: 'Pack voltage', color: '#4cc9f0' }] },

  { title: '12 V battery (V)', yLabel: 'V', requireNonZero: true,
    series: [{ field: 'battery12vVoltage', label: '12V', color: '#ffb84d' }] },

  { title: 'Cell voltage spread (V)', yLabel: 'V', requireNonZero: true,
    series: [
      { field: 'batteryCellVoltageMax', label: 'Max', color: '#f72585' },
      { field: 'batteryCellVoltageMin', label: 'Min', color: '#4cc9f0' }
    ] },

  { title: 'Total discharge (kWh)', yLabel: 'kWh', requireNonZero: true,
    series: [{ field: 'totalDischarge', label: 'Total discharge', color: '#f72585' }] },

  { title: 'Odometer (km)', yLabel: 'km', requireNonZero: true,
    series: [{ field: 'odometer', label: 'Odometer', color: '#9aa3b2' }] },

  { title: 'Engine speed (RPM)', yLabel: 'RPM', fullWidth: true, requireNonZero: true,
    series: [
      { field: 'engineSpeedFront', label: 'Front', color: '#4cc9f0', requireNonZero: true },
      { field: 'engineSpeedRear',  label: 'Rear',  color: '#f72585', requireNonZero: true }
    ] },

  { title: 'Tyre pressures (bar)', yLabel: 'bar', fullWidth: true, requireNonZero: true,
    series: [
      { field: 'tyrePressureLF', label: 'Front L', color: '#4cc9f0' },
      { field: 'tyrePressureRF', label: 'Front R', color: '#f72585' },
      { field: 'tyrePressureLR', label: 'Rear L',  color: '#ffb84d' },
      { field: 'tyrePressureRR', label: 'Rear R',  color: '#90e0a0' }
    ] },

  { title: 'Tyre temperatures (°C)', yLabel: '°C', fullWidth: true, requireNonZero: true,
    series: [
      { field: 'tyreTempLF', label: 'Front L', color: '#4cc9f0' },
      { field: 'tyreTempRF', label: 'Front R', color: '#f72585' },
      { field: 'tyreTempLR', label: 'Rear L',  color: '#ffb84d' },
      { field: 'tyreTempRR', label: 'Rear R',  color: '#90e0a0' }
    ] },

  // ── Derived analytics ────────────────────────────────────────────────────
  { title: 'Cumulative distance (km)', build: buildCumulativeDistance },
  { title: 'Cumulative energy (kWh)',  build: buildCumulativeEnergy },
  { title: 'Speed vs Power (efficiency cloud)', fullWidth: true, build: buildSpeedPowerScatter },
  { title: 'Power distribution',       build: buildPowerHistogram },
];

// ── Embedded-trip mode ─────────────────────────────────────────────────────
// When this file is shipped with a trip pre-bundled (the Android app's
// "Save as HTML" export injects a <script> block before this one that sets
// window.__embeddedTrip), skip the file picker and render immediately. The
// user can just double-click the HTML and the trip opens with no prompt.
if (typeof window.__embeddedTrip === 'object' && window.__embeddedTrip) {
  try {
    renderTrip(window.__embeddedTrip);
    // Hide the reset button — there's no other file to fall back to.
    resetBtn.classList.add('hidden');
  } catch (err) {
    showError('Failed to render embedded trip: ' + err.message);
  }
}
</script>
