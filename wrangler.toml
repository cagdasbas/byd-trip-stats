# Cloudflare deployment config for the BYD Trip Stats marketing website.
# This is a static-asset-only Worker: no server code, it just serves the
# files in ./website. `npx wrangler deploy` (the dashboard's default deploy
# command) reads this file and uploads that directory.

name = "byd-trip-stats"
compatibility_date = "2026-06-01"

[assets]
directory = "./website"
# Serve website/404.html for unknown paths.
not_found_handling = "404-page"
